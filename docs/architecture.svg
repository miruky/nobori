<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-label="noboriの処理の流れ">
  <title>noboriの処理の流れ。フォーム入力からBannerOptionsを作り、純関数renderBannerがSVG文字列を返す。プレビュー・ダウンロード・コピーは同じ文字列を使う。</title>
  <style>
    svg {
      --ink: #1f2328;
      --accent: #3f51b5;
      color: var(--ink);
    }
    @media (prefers-color-scheme: dark) {
      svg { --ink: #e6edf3; --accent: #8c9aef; }
    }
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: var(--accent); stroke-width: 2; }
    .label { font: 600 14px "Hiragino Sans", "Noto Sans JP", sans-serif; fill: currentColor; }
    .note { font: 11px "Hiragino Sans", "Noto Sans JP", sans-serif; fill: currentColor; opacity: 0.65; }
    .mono { font: 11px "SF Mono", Menlo, monospace; fill: currentColor; opacity: 0.8; }
    .flow { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect x="30" y="70" width="190" height="110" rx="8" class="box"/>
  <text x="50" y="98" class="label">フォーム</text>
  <text x="50" y="120" class="note">タイトル・テーマ・柄・</text>
  <text x="50" y="138" class="note">サイズ・配置</text>
  <text x="50" y="160" class="mono">BannerOptions</text>

  <rect x="300" y="70" width="230" height="110" rx="8" class="accent-box"/>
  <text x="320" y="98" class="label">renderBanner()</text>
  <text x="320" y="120" class="note">純関数。グラデーション・柄の</text>
  <text x="320" y="138" class="note">defsと2つのtextを組み立てる</text>
  <text x="320" y="160" class="mono">(options) =&gt; svg文字列</text>

  <rect x="610" y="20" width="180" height="60" rx="8" class="box"/>
  <text x="630" y="55" class="label">プレビュー</text>

  <rect x="610" y="100" width="180" height="60" rx="8" class="box"/>
  <text x="630" y="135" class="label">ダウンロード(Blob)</text>

  <rect x="610" y="180" width="180" height="60" rx="8" class="box"/>
  <text x="630" y="215" class="label">ソースをコピー</text>

  <path d="M 220 125 L 300 125" class="flow"/>
  <path d="M 530 105 C 560 90 580 70 608 55" class="flow"/>
  <path d="M 530 125 L 610 128" class="flow"/>
  <path d="M 530 150 C 560 165 580 190 608 205" class="flow"/>
</svg>
