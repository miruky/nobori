<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="README用のSVGバナーと見出し画像をブラウザで生成する" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <title>nobori - README用SVGバナージェネレータ</title>
    <script>
      // 描画前にテーマを確定させてちらつきを防ぐ。失敗してもライトで続行する。
      (function () {
        try {
          var raw = localStorage.getItem('nobori:theme');
          var pref = raw === 'light' || raw === 'dark' ? raw : 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <main>
      <div class="topbar">
        <p class="kicker">SVG Banner Generator</p>
        <button id="theme-toggle" type="button" class="theme-toggle" aria-label="テーマ切替">
          <svg class="theme-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="1.6" />
            <g class="rays" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
              <line x1="12" y1="1.5" x2="12" y2="4" />
              <line x1="12" y1="20" x2="12" y2="22.5" />
              <line x1="1.5" y1="12" x2="4" y2="12" />
              <line x1="20" y1="12" x2="22.5" y2="12" />
              <line x1="4.4" y1="4.4" x2="6.2" y2="6.2" />
              <line x1="17.8" y1="17.8" x2="19.6" y2="19.6" />
              <line x1="4.4" y1="19.6" x2="6.2" y2="17.8" />
              <line x1="17.8" y1="6.2" x2="19.6" y2="4.4" />
            </g>
            <path
              class="moon"
              d="M20 13.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 13.5Z"
              fill="currentColor"
            />
          </svg>
          <span id="theme-label" class="theme-label">システム</span>
        </button>
      </div>

      <header class="hero">
        <svg
          class="mark"
          viewBox="0 0 128 128"
          width="46"
          height="46"
          role="img"
          aria-label="nobori"
        >
          <title>nobori</title>
          <g
            fill="none"
            stroke="currentColor"
            stroke-width="6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="36" y1="14" x2="36" y2="114" />
            <path d="M36 22 H100 L86 46 L100 70 H36" />
          </g>
          <g stroke="var(--accent)" stroke-width="6" stroke-linecap="round">
            <line x1="50" y1="38" x2="80" y2="38" />
            <line x1="50" y1="54" x2="70" y2="54" />
          </g>
        </svg>
        <h1>nobori</h1>
      </header>
      <p class="lead">
        README用のSVGバナーと見出し画像を、ブラウザだけで作る。書き出すのは外部フォントにも画像にも依存しない自己完結のSVGなので、どの閲覧環境でも崩れない。
      </p>

      <section class="preview-wrap" aria-label="プレビュー">
        <div id="preview"></div>
      </section>

      <form id="controls">
        <div class="field wide">
          <label for="title">タイトル</label>
          <input id="title" type="text" value="nobori" maxlength="40" />
        </div>
        <div class="field wide">
          <label for="subtitle">サブタイトル(任意)</label>
          <input id="subtitle" type="text" value="README banner generator" maxlength="60" />
        </div>
        <div class="field">
          <label for="theme">テーマ</label>
          <select id="theme"></select>
        </div>
        <div class="field">
          <label for="pattern">柄</label>
          <select id="pattern"></select>
        </div>
        <div class="field">
          <label for="font">書体</label>
          <select id="font"></select>
        </div>
        <div class="field">
          <label for="background">背景</label>
          <select id="background"></select>
        </div>
        <div class="field">
          <label for="size">サイズ</label>
          <select id="size">
            <option value="800x200" selected>800 × 200(標準)</option>
            <option value="1280x320">1280 × 320(大)</option>
            <option value="600x150">600 × 150(小)</option>
            <option value="800x400">800 × 400(正方形寄り)</option>
          </select>
        </div>
        <div class="field">
          <label for="align">配置</label>
          <select id="align">
            <option value="center" selected>中央</option>
            <option value="left">左寄せ</option>
          </select>
        </div>
      </form>

      <div class="actions">
        <button id="download" type="button" class="primary">SVGをダウンロード</button>
        <button id="download-png" type="button">PNGをダウンロード</button>
        <button id="copy" type="button">SVGソースをコピー</button>
        <button id="copy-link" type="button">共有リンクをコピー</button>
        <span id="copied" role="status"></span>
      </div>

      <section class="usage">
        <h2>READMEでの使い方</h2>
        <p>
          ダウンロードした <code>banner.svg</code> をリポジトリに置き、READMEの先頭で
          <code>![バナー](docs/banner.svg)</code> のように参照する。SVGは外部フォントに
          依存しないので、閲覧環境で見た目が崩れない。
        </p>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
